AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
	Environment:
		Type: String
	Stage:
		Type: String
	DatabaseUrl:
		Type: String
	ProfileApiId:
		Type: String
	CommonLayerArn:
		Type: String

Globals:
	Function:
		Timeout: 30
		Runtime: python3.14
		Environment:
			Variables:
				ENVIRONMENT: !Ref Environment
				STAGE: !Ref Stage
				DATABASE_URL: !Ref DatabaseUrl

Resources:
  DirectConversationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'message-${Environment}-direct-conversation-function'
      CodeUri: ../src/services/direct_conversation
      Handler: direct_conversation_lambda.lambda_handler
      Layers:
        - !Ref CommonLayer
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        StartDirectConversation:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/direct/conversations
            Method: POST
        GetUserConversations:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/direct/conversations
            Method: GET
        GetConversationById:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/direct/conversations/{dm_id}
            Method: GET

Outputs:
	DirectConversationFunctionArn:
		Value: !GetAtt DirectConversationFunction.Arn
