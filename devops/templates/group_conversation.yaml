AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
	Environment:
		Type: String
	Stage:
		Type: String
	DatabaseUrl:
		Type: String
	ProfileApiId:
		Type: String
	CommonLayerArn:
		Type: String

Globals:
	Function:
		Timeout: 30
		Runtime: python3.14
		Environment:
			Variables:
				ENVIRONMENT: !Ref Environment
				STAGE: !Ref Stage
				DATABASE_URL: !Ref DatabaseUrl

Resources:
	GroupConversationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'message-${Environment}-group-conversation-function'
      CodeUri: ../src/services/group_conversation
      Handler: group_conversation_lambda.lambda_handler
      Layers:
        - !Ref CommonLayer
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        StartGroupConversation:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/group/conversations
            Method: POST
        GetUserConversations:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/group/conversations
            Method: GET
        GetConversationById:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/group/conversations/{group_id}
            Method: GET
        UpdateGroupConversation:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/group/conversations/{group_id}
            Method: PATCH
        DeleteGroupConversation:
          Type: Api
          Properties:
            RestApiId: !Ref ProfileApi
            Path: /api/v1/group/conversations/{group_id}
            Method: DELETE

Outputs:
	GroupConversationFunctionArn:
		Value: !GetAtt GroupConversationFunction.Arn
